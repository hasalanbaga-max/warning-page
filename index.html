<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;
color:white;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial,Helvetica,sans-serif;

overflow:hidden;

transition:opacity .8s;

}

.container{

text-align:center;

animation:fadeIn 1.2s;

}

.line1{

font-size:60px;

font-weight:bold;

letter-spacing:2px;

margin-bottom:25px;

color:white;

}

.line2{

font-size:70px;

font-weight:900;

color:#ff2020;

text-shadow:
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000;

margin-bottom:60px;

}

#count{

font-size:150px;

font-weight:bold;

color:white;

animation:pulse .9s infinite;

text-shadow:
0 0 10px white,
0 0 30px white;

}

.progress{

width:450px;
max-width:85vw;

height:10px;

background:#333;

margin:auto;

margin-top:45px;

border-radius:50px;

overflow:hidden;

}

.bar{

height:100%;
width:0%;
background:#ff2020;

transition:width 1s linear;

}

@keyframes pulse{

0%{

transform:scale(1);

}

50%{

transform:scale(1.15);

}

100%{

transform:scale(1);

}

}

@keyframes fadeIn{

from{

opacity:0;

transform:scale(.95);

}

to{

opacity:1;

transform:scale(1);

}

}

</style>

</head>

<body>

<div class="container">

<div class="line1">
אתם בחרתם בזה...
</div>

<div class="line2">
הנה זה מגיע
</div>

<div id="count">5</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<script>

const url="https://www.youtube.com/watch?v=Aq6L5ilesNs";

let sec=5;

const count=document.getElementById("count");
const bar=document.getElementById("bar");

count.innerHTML=sec;

const timer=setInterval(()=>{

sec--;

bar.style.width=((5-sec)*20)+"%";

if(sec>=0){

count.innerHTML=sec;

}

if(sec<0){

clearInterval(timer);

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href=url;

},800);

}

},1000);

</script>

</body>
</html>
