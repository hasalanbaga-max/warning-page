<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>מעבר...</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#ffffff;

    font-family:"Segoe UI",Arial,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

    transition:opacity .5s;

}

.box{

    border:3px solid #d80000;

    border-radius:18px;

    padding:50px 45px;

    text-align:center;

    width:min(90%,600px);

    background:#fff;

}

.line1{

    font-size:42px;

    font-weight:500;

    color:#222;

    margin-bottom:15px;

}

.line2{

    font-size:54px;

    font-weight:700;

    color:#d80000;

    margin-bottom:40px;

}

#count{

    font-size:92px;

    font-weight:700;

    color:#d80000;

    margin-bottom:35px;

}

.progress{

    width:100%;

    height:8px;

    background:#ececec;

    border-radius:100px;

    overflow:hidden;

}

.bar{

    width:0%;

    height:100%;

    background:#d80000;

    transition:width 1s linear;

}

</style>

</head>

<body>

<div class="box">

    <div class="line1">
        אתם בחרתם בזה...
    </div>

    <div class="line2">
        הנה זה מגיע
    </div>

    <div id="count">3</div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

</div>

<script>

const targetUrl = "https://www.youtube.com/watch?v=Aq6L5ilesNs";

let seconds = 3;

const count = document.getElementById("count");
const bar = document.getElementById("bar");

function update(){

    bar.style.width = ((3-seconds)/3*100) + "%";

    count.textContent = seconds;

    if(seconds === 0){

        clearInterval(timer);

        document.body.style.opacity = "0";

        setTimeout(()=>{

            window.location.href = targetUrl;

        },500);

    }

    seconds--;

}

update();

const timer = setInterval(update,1000);

</script>

</body>

</html>
