<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>מעבר...</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    color:#222;
    font-family:"Segoe UI",Arial,sans-serif;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:opacity .5s ease;
}

.container{
    text-align:center;
    width:min(90%,600px);
}

.line1{
    font-size:44px;
    font-weight:500;
    margin-bottom:18px;
}

.line2{
    font-size:58px;
    font-weight:700;
    margin-bottom:45px;
}

#count{
    font-size:90px;
    font-weight:700;
    margin-bottom:35px;
}

.progress{
    width:100%;
    max-width:360px;
    height:6px;
    background:#e5e5e5;
    border-radius:999px;
    overflow:hidden;
    margin:auto;
}

.bar{
    width:0%;
    height:100%;
    background:#222;
    transition:width 1s linear;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.container{
    animation:fadeIn .8s ease;
}

</style>

</head>

<body>

<div class="container">

    <div class="line1">
        אתם בחרתם בזה...
    </div>

    <div class="line2">
        אין דרך חזרה
    </div>

    <div id="count">3</div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

</div>

<script>

const targetUrl = "https://www.youtube.com/watch?v=Aq6L5ilesNs";

let seconds = 3;

const count = document.getElementById("count");
const bar = document.getElementById("bar");

count.textContent = seconds;

function update(){

    bar.style.width = ((3 - seconds) / 3 * 100) + "%";

    if(seconds === 0){

        count.textContent = "0";

        clearInterval(timer);

        document.body.style.opacity = "0";

        setTimeout(() => {
            window.location.href = targetUrl;
        }, 500);

        return;
    }

    seconds--;

    count.textContent = seconds;

}

const timer = setInterval(update,1000);

</script>

</body>
</html>
